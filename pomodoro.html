<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Zamanlayıcı</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(145deg, #fef9f0 0%, #f5f0e8 100%);
    color: #2c2c2c;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
}
.container { max-width: 600px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
.card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 36px 32px;
    box-shadow: 0 2px 40px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.5);
}
.timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}
.ring-container {
    position: relative;
    width: 220px;
    height: 220px;
}
.ring-container svg { transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(0,0,0,0.06); stroke-width: 6; }
.ring-progress {
    fill: none;
    stroke: #c06a3e;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease;
}
.ring-progress.break { stroke: #4a8fc0; }
.timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.timer-display {
    font-size: 3.2rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 2px;
    line-height: 1;
}
.timer-label {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
    font-weight: 500;
}
.controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}
.btn {
    padding: 12px 28px;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
    background: #c06a3e;
    color: #fff;
}
.btn:hover { background: #a85932; transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: default; transform: none; }
.btn-secondary {
    background: transparent;
    border: 1px solid #ddd;
    color: #555;
}
.btn-secondary:hover { border-color: #c06a3e; color: #c06a3e; background: transparent; }
.btn-danger {
    background: transparent;
    border: 1px solid #f0c0b0;
    color: #b06040;
}
.btn-danger:hover { border-color: #c06a3e; color: #c06a3e; }
.settings-row {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
}
.setting {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
.setting label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 500; }
.setting input[type="number"] {
    width: 64px;
    padding: 8px 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    font-weight: 600;
    text-align: center;
    background: #fff;
    color: #2c2c2c;
    outline: none;
    font-family: inherit;
}
.setting input[type="number"]:focus { border-color: #c06a3e; }
.setting input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
.sessions {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 4px;
}
.session-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #eee;
    transition: background 0.3s;
}
.session-dot.done { background: #c06a3e; }
.session-dot.current { background: #f0d0b0; }
.phase-info {
    display: flex;
    gap: 16px;
    justify-content: center;
    font-size: 13px;
    color: #888;
}
.phase-info span { display: flex; align-items: center; gap: 6px; }
.phase-info .num { font-weight: 700; color: #2c2c2c; }
.tasks-section { margin-top: 8px; }
.tasks-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
}
.task-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.task-input-row input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid #ddd;
    font-size: 14px;
    background: #fff;
    color: #2c2c2c;
    outline: none;
    font-family: inherit;
}
.task-input-row input:focus { border-color: #c06a3e; }
.task-input-row button {
    padding: 10px 16px;
    border-radius: 12px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    background: #c06a3e;
    color: #fff;
    transition: background 0.2s;
    font-family: inherit;
}
.task-input-row button:hover { background: #a85932; }
.task-list { display: flex; flex-direction: column; gap: 6px; }
.task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.4);
    transition: background 0.15s;
}
.task-item:hover { background: rgba(255,255,255,0.7); }
.task-item.done .task-text { text-decoration: line-through; color: #bbb; }
.task-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 2px solid #ddd;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 12px;
    color: transparent;
}
.task-item.done .task-check { background: #c06a3e; border-color: #c06a3e; color: #fff; }
.task-text { flex: 1; font-size: 14px; }
.task-delete {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: all 0.15s;
}
.task-delete:hover { color: #c06a3e; background: rgba(192,106,62,0.1); }
.empty-tasks {
    font-size: 13px;
    color: #ccc;
    text-align: center;
    padding: 20px 0;
}
footer {
    text-align: center;
    font-size: 12px;
    color: #ccc;
}
footer a { color: #c06a3e; text-decoration: none; }

/* Back to Home Button */
.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    text-decoration: none;
    color: #555;
    background: rgba(255, 255, 255, 0.8);
    padding: 10px 15px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid #ddd;
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
}
.back-btn:hover {
    border-color: #c06a3e;
    color: #c06a3e;
    transform: translateX(4px);
}
@media (max-width: 768px) {
    .back-btn {
        top: 10px;
        left: 10px;
        padding: 8px 12px;
        font-size: 11px;
    }
}
</style>
</head>
<body>

<a href="index.html" class="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Ana Sayfa
</a>

<div class="container">
    <div class="card">
        <div class="timer-wrap">
            <div class="ring-container">
                <svg viewBox="0 0 220 220" width="220" height="220">
                    <circle class="ring-bg" cx="110" cy="110" r="100"/>
                    <circle class="ring-progress" id="ring" cx="110" cy="110" r="100"
                        stroke-dasharray="628.3" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-text">
                    <div class="timer-display" id="timerDisplay">25:00</div>
                    <div class="timer-label" id="timerLabel">Çalışma</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn" id="startBtn">▶ Başla</button>
                <button class="btn btn-secondary" id="pauseBtn" disabled>⏸ Duraklat</button>
                <button class="btn btn-secondary" id="resetBtn">↺ Sıfırla</button>
            </div>

            <div class="settings-row">
                <div class="setting">
                    <label>Çalışma</label>
                    <input type="number" id="workDuration" value="25" min="1" max="120">
                </div>
                <div class="setting">
                    <label>Mola</label>
                    <input type="number" id="breakDuration" value="5" min="1" max="60">
                </div>
                <div class="setting">
                    <label>Uzun Mola</label>
                    <input type="number" id="longBreakDuration" value="15" min="1" max="60">
                </div>
                <div class="setting">
                    <label>Sıklık</label>
                    <input type="number" id="longBreakInterval" value="4" min="1" max="10">
                </div>
            </div>

            <div class="phase-info">
                <span>🎯 Pomodoro <span class="num" id="pomodoroCount">0</span></span>
                <span id="phaseIndicator">⏳ Çalışma</span>
            </div>

            <div class="sessions" id="sessionDots"></div>
        </div>
    </div>

    <div class="card tasks-section">
        <h3>📋 Görevler</h3>
        <div class="task-input-row">
            <input type="text" id="taskInput" placeholder="görev ekle...">
            <button id="addTaskBtn">Ekle</button>
        </div>
        <div class="task-list" id="taskList"></div>
    </div>

    <footer>
        <a href="https://arcahmet.github.io">arcahmet</a>
    </footer>
</div>

<script>
// === STATE ===
const state = {
    mode: 'work',          // work | break | longBreak
    seconds: 25 * 60,
    totalSeconds: 25 * 60,
    isRunning: false,
    isPaused: false,
    pomodoroCount: 0,
    workDuration: 25,
    breakDuration: 5,
    longBreakDuration: 15,
    longBreakInterval: 4,
    timer: null,
    tasks: JSON.parse(localStorage.getItem('pomodoroTasks') || '[]'),
};

// === DOM REFS ===
const timerDisplay = document.getElementById('timerDisplay');
const timerLabel = document.getElementById('timerLabel');
const ring = document.getElementById('ring');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const workInput = document.getElementById('workDuration');
const breakInput = document.getElementById('breakDuration');
const longBreakInput = document.getElementById('longBreakDuration');
const intervalInput = document.getElementById('longBreakInterval');
const pomodoroCountEl = document.getElementById('pomodoroCount');
const phaseIndicator = document.getElementById('phaseIndicator');
const sessionDots = document.getElementById('sessionDots');
const taskInput = document.getElementById('taskInput');
const addTaskBtn = document.getElementById('addTaskBtn');
const taskList = document.getElementById('taskList');

const CIRCUMFERENCE = 2 * Math.PI * 100; // ~628.3

// === TIMER LOGIC ===
function setDuration() {
    const total = state.mode === 'work' ? state.workDuration
                : state.mode === 'break' ? state.breakDuration
                : state.longBreakDuration;
    if (!state.isRunning) {
        state.totalSeconds = total * 60;
        state.seconds = state.totalSeconds;
        updateDisplay();
    }
}

function updateDisplay() {
    const m = String(Math.floor(state.seconds / 60)).padStart(2, '0');
    const s = String(state.seconds % 60).padStart(2, '0');
    timerDisplay.textContent = `${m}:${s}`;

    const pct = state.totalSeconds > 0 ? state.seconds / state.totalSeconds : 0;
    ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);

    const labels = { work: 'Çalışma', break: 'Mola', longBreak: 'Uzun Mola' };
    timerLabel.textContent = labels[state.mode];
    ring.classList.toggle('break', state.mode !== 'work');

    phaseIndicator.textContent = state.mode === 'work' ? '🍅 Çalışma' : '☕ Mola';
}

function tick() {
    if (state.isPaused) return;
    state.seconds--;
    updateDisplay();

    if (state.seconds <= 0) {
        clearInterval(state.timer);
        state.isRunning = false;
        state.isPaused = false;
        playSound();
        nextMode();
    }
}

function startTimer() {
    if (state.isPaused) {
        state.isPaused = false;
        state.isRunning = true;
        state.timer = setInterval(tick, 1000);
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        return;
    }
    if (state.isRunning) return;
    state.isRunning = true;
    state.timer = setInterval(tick, 1000);
    startBtn.textContent = '▶ Başla';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
}

function pauseTimer() {
    if (!state.isRunning || state.isPaused) return;
    state.isPaused = true;
    clearInterval(state.timer);
    startBtn.disabled = false;
    startBtn.textContent = '▶ Devam';
    pauseBtn.disabled = true;
}

function resetTimer() {
    clearInterval(state.timer);
    state.isRunning = false;
    state.isPaused = false;
    state.mode = 'work';
    state.seconds = state.workDuration * 60;
    state.totalSeconds = state.workDuration * 60;
    updateDisplay();
    startBtn.textContent = '▶ Başla';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    updateSessions();
}

function nextMode() {
    if (state.mode === 'work') {
        state.pomodoroCount++;
        pomodoroCountEl.textContent = state.pomodoroCount;
        if (state.pomodoroCount % state.longBreakInterval === 0) {
            state.mode = 'longBreak';
        } else {
            state.mode = 'break';
        }
    } else {
        state.mode = 'work';
    }
    setDuration();
    updateSessions();
    startTimer();
}

function playSound() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);

        // second beep
        setTimeout(() => {
            const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
            const osc2 = ctx2.createOscillator();
            const gain2 = ctx2.createGain();
            osc2.connect(gain2);
            gain2.connect(ctx2.destination);
            osc2.frequency.value = 1000;
            osc2.type = 'sine';
            gain2.gain.setValueAtTime(0.3, ctx2.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + 0.4);
            osc2.start(ctx2.currentTime);
            osc2.stop(ctx2.currentTime + 0.4);
        }, 200);
    } catch(e) { /* silent fail */ }
}

function updateSessions() {
    const total = state.pomodoroCount;
    let html = '';
    for (let i = 0; i < total; i++) {
        html += `<span class="session-dot done"></span>`;
    }
    if (state.mode !== 'work' || state.seconds > 0) {
        html += `<span class="session-dot current"></span>`;
    }
    sessionDots.innerHTML = html || '<span style="font-size:12px;color:#ccc">Henüz tamamlanan pomodoro yok</span>';
}

// === SETTINGS ===
function applySettings() {
    const w = parseInt(workInput.value) || 25;
    const b = parseInt(breakInput.value) || 5;
    const lb = parseInt(longBreakInput.value) || 15;
    const intv = parseInt(intervalInput.value) || 4;
    state.workDuration = w;
    state.breakDuration = b;
    state.longBreakDuration = lb;
    state.longBreakInterval = intv;
    if (!state.isRunning) {
        state.mode = 'work';
        setDuration();
        updateSessions();
    }
}

[workInput, breakInput, longBreakInput, intervalInput].forEach(el => {
    el.addEventListener('change', applySettings);
});

// === TASKS ===
function renderTasks() {
    taskList.innerHTML = '';
    if (state.tasks.length === 0) {
        taskList.innerHTML = '<div class="empty-tasks">Henüz görev eklenmemiş</div>';
        return;
    }
    state.tasks.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = `task-item${t.done ? ' done' : ''}`;
        div.innerHTML = `
            <div class="task-check">${t.done ? '✓' : ''}</div>
            <span class="task-text">${escapeHtml(t.text)}</span>
            <button class="task-delete" data-idx="${i}">✕</button>
        `;
        div.querySelector('.task-check').addEventListener('click', () => {
            state.tasks[i].done = !state.tasks[i].done;
            saveTasks();
            renderTasks();
        });
        div.querySelector('.task-delete').addEventListener('click', () => {
            state.tasks.splice(i, 1);
            saveTasks();
            renderTasks();
        });
        taskList.appendChild(div);
    });
}

function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
}

function saveTasks() {
    localStorage.setItem('pomodoroTasks', JSON.stringify(state.tasks));
}

function addTask() {
    const text = taskInput.value.trim();
    if (!text) return;
    state.tasks.push({ text, done: false });
    saveTasks();
    renderTasks();
    taskInput.value = '';
    taskInput.focus();
}

addTaskBtn.addEventListener('click', addTask);
taskInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });

// === EVENTS ===
startBtn.addEventListener('click', startTimer);
pauseBtn.addEventListener('click', pauseTimer);
resetBtn.addEventListener('click', resetTimer);

// === INIT ===
applySettings();
renderTasks();
updateSessions();
</script>
</body>
</html>
