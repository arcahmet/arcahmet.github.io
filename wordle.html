<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KELIME</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@300;400;700;800&display=swap');

:root {
  --bg: #faf8f3;
  --surface: #ffffff;
  --border: #d4cfc4;
  --text: #2c2a25;
  --subtext: #9a9488;
  --correct: #5a9e6f;
  --present: #c9a84c;
  --absent: #8a8580;
  --correct-light: #e8f5ee;
  --present-light: #fdf3dc;
  --absent-light: #efefed;
  --key-bg: #e8e4da;
  --key-text: #2c2a25;
  --accent: #c0392b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  color: var(--text);
  padding-bottom: 30px;
}

/* Header */
header {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 24px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(24px, 7vw, 34px);
  letter-spacing: clamp(3px, 1.2vw, 6px);
  color: var(--text);
  line-height: 1;
}
.logo span { color: var(--accent); }

.header-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}
.streak {
  font-size: 11px;
  font-weight: 700;
  color: var(--subtext);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.streak-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--correct);
  line-height: 1;
}

/* Status message */
.msg-bar {
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
}
.msg {
  background: var(--text);
  color: var(--bg);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 6px 18px;
  border-radius: 20px;
  opacity: 0;
  transform: translateY(-6px);
  transition: all 0.25s;
}
.msg.show {
  opacity: 1;
  transform: translateY(0);
}

/* Grid */
.grid {
  display: flex;
  flex-direction: column;
  gap: clamp(3px, 1vw, 6px);
  margin-bottom: 24px;
}

.row {
  display: flex;
  gap: clamp(3px, 1vw, 6px);
}

.tile {
  width: clamp(38px, 11vw, 58px);
  height: clamp(38px, 11vw, 58px);
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(18px, 5.5vw, 28px);
  letter-spacing: 1px;
  color: var(--text);
  background: var(--surface);
  transition: border-color 0.1s;
  position: relative;
  user-select: none;
}

.tile.filled {
  border-color: #b0aa9e;
  animation: pop 0.1s ease-out;
}

.tile.correct {
  background: var(--correct);
  border-color: var(--correct);
  color: white;
}
.tile.present {
  background: var(--present);
  border-color: var(--present);
  color: white;
}
.tile.absent {
  background: var(--absent);
  border-color: var(--absent);
  color: white;
}

/* Flip animation on reveal */
.tile.reveal {
  animation: flip 0.5s ease forwards;
}

@keyframes flip {
  0%   { transform: rotateX(0deg); }
  49%  { transform: rotateX(90deg); }
  50%  { transform: rotateX(90deg); }
  100% { transform: rotateX(0deg); }
}

@keyframes pop {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.12); }
  100% { transform: scale(1); }
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
}

.row.shake { animation: shake 0.4s ease; }

@keyframes bounce {
  0%,100% { transform: translateY(0); }
  40% { transform: translateY(-16px); }
  60% { transform: translateY(-8px); }
}
.tile.bounce { animation: bounce 0.5s ease; }

/* Keyboard */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: clamp(4px, 1.5vw, 8px);
  align-items: center;
  width: 100%;
  max-width: 520px;
  padding: 0 clamp(4px, 2vw, 8px);
}

.key-row {
  display: flex;
  gap: clamp(3px, 0.8vw, 5px);
  justify-content: center;
}

.key {
  height: clamp(44px, 10vw, 54px);
  min-width: clamp(28px, 7vw, 36px);
  padding: 0 6px;
  border: none;
  border-radius: 6px;
  background: var(--key-bg);
  color: var(--key-text);
  font-family: 'Nunito', sans-serif;
  font-size: clamp(11px, 3vw, 13px);
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  box-shadow: 0 2px 0 rgba(0,0,0,0.12);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.key:active { transform: translateY(1px); box-shadow: none; }
.key.wide { min-width: 58px; font-size: 11px; }

.key.correct { background: var(--correct); color: white; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
.key.present { background: var(--present); color: white; box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
.key.absent  { background: var(--absent);  color: white; box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

/* Win overlay (inline, not modal) */
.result-box {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin: 16px 0;
  padding: 20px 28px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  max-width: 340px;
  text-align: center;
  animation: fadeIn 0.4s ease;
}
.result-box.show { display: flex; }

@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to   { opacity:1; transform: translateY(0); }
}

.result-emoji { font-size: 40px; }
.result-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--text);
}
.result-word {
  font-size: 13px;
  color: var(--subtext);
}
.result-word strong { color: var(--text); font-size: 16px; letter-spacing: 2px; }

.play-again {
  background: var(--text);
  color: var(--bg);
  border: none;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  padding: 12px 28px;
  border-radius: 8px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  margin-top: 4px;
}
.play-again:hover {
  background: var(--accent);
  transform: translateY(-1px);
}

/* Decorative dots */
.dots {
  display: flex;
  gap: 6px;
  margin: 8px 0;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
}
.dot.c { background: var(--correct); }
.dot.p { background: var(--present); }
</style>
</head>
<body>

<header>
  <div class="logo">KEL<span>İ</span>ME</div>
  <div class="header-right">
    <div class="streak">🔥 seri</div>
    <div class="streak-val" id="streakVal">0</div>
  </div>
</header>

<div class="msg-bar"><div class="msg" id="msg"></div></div>

<div class="grid" id="grid"></div>

<div class="result-box" id="resultBox">
  <div class="result-emoji" id="resultEmoji"></div>
  <div class="result-title" id="resultTitle"></div>
  <div class="dots"><div class="dot c"></div><div class="dot p"></div><div class="dot"></div></div>
  <div class="result-word" id="resultWord"></div>
  <button class="play-again" onclick="newGame()">YENİ KELİME</button>
</div>

<div class="keyboard" id="keyboard"></div>

<script>
// ─── WORD LIST ────────────────────────────────────────────────────────────────
const WORDS = [
  'ARABA','BEBEK','CADDE','DUMAN','ELMAS','FENER','GITAR','HASTA','İNSAN','JAPON',
  'KALEM','LAHIT','MADEN','NAZAR','OCAK','PASTA','RAKET','SANAT','TAŞİT','UZMAN',
  'VİTES','YAZAR','ZAMAN','ALARM','BANKA','ÇELIK','DAĞİL','ERKEK','FİKİR','GÜNEŞ',
  'HABER','İZMİR','KANAT','LAMBA','MASAL','NİYET','OYNAK','PERDE','RENK','SAHNE',
  'TAVAN','UÇUŞ','VATAN','YEMEĞİ','ZEMIN','ADRES','BULUT','ÇİÇEK','DENIZ','EVRİM',
  'FAYDA','GEMİ','HAYAL','İPEK','KADIN','LISAN','MEYVE','NOTER','OLGUN','PAZAR',
  'RESIM','SEZON','TARAF','UĞRAŞ','VERGI','YORUM','ZENGI','ARAZI','BİTKİ','ÇORBA',
  'DAVUL','EKRAN','FASIL','GÖREV','HESAP','İZLEM','KARMA','LOKAL','MUTLU','NÜKTE',
  'ÖZGÜR','PAZIR','RÜZGR','SALON','TAHTA','UMUT','VAKIF','YAZIM','ZATEN','ASKER',
  'BUĞDAY','ÇEVRE','DEVIR','EFSANE','FORUM','GÖRÜŞ','HAMUR','İNEK','KALIP','LEZIZ',
  'MIRAS','NEHIR','ORAN','PEYNR','RAYIÇ','SİVİL','TURİZ','UZAKL','VERİM','YIKIL',
  'ABIDE','BIÇAK','ÇANAK','DEMET','ELMAN','FIDAN','GÖLGE','HİSSE','İÇERİ','KABUL',
  'LIMON','MASKE','NIYET','OMLET','PİLAV','ROBOT','SIMIT','TOPUK','ULUSAL','VAPUR',
  'YILAN','ZORLU','AÇLIK','BÖLGE','ÇIĞIR','DAMAR','ETKEN','FENER','GELİR','HAMLE',
  'İKLİM','KARŞI','LANET','MANGA','NEHIR','OYUNU','PENÇE','RÜZGAR','SABAH','TANGI',
  'UZMAN','VURGU','YETKİ','ZİYAN','AKICI','BURUN','ÇÖMLEK','DÖNÜŞ','ERDEM','FAYDA',
  'GARIP','HIZLI','İŞARET','KAYAK','LOĞUSA','MEYDAN','NESIL','OTLAK','PETEK','RESMI',
  'SIVRI','TAŞIM','ULEMA','VAKIT','YANGI','ZORBA','ALARM','BIÇIM','ÇÖZÜM','DEVAM',
  'ELÇI','FAKIR','GÜDÜK','HİKAY','İKRAM','KURAL','LEVHA','MANTO','NAZIM','ONLAR',
  'PALTO','RAGBI','SUNUM','TEKLF','UNVAN','VENÜS','YANKI','ZİNCR',
  // Daha yaygın kelimeler
  'TEMEL','SINIF','KİTAP','OKUL','MASA','ARABA','KAPAK','DUVAR','PENCERE','YÜZÜK',
  'ÇANTA','BAHÇE','SOKAK','KÖPRÜ','NEHIR','GÖLET','ORMAN','YAYLA','KIYIM','BAYIR',
  'YUNUS','KARTAL','ASLAN','KAPLAN','KİRPİ','TAVŞAN','SİNEK','ARICI','BALIK','KARGO',
];

// Sadece 5 harflileri filtrele ve temizle
const VALID = [...new Set(
  WORDS.filter(w => [...w].length === 5).map(w => w.toUpperCase())
)];

// Türkçe klavye düzeni
const ROWS_TR = [
  ['E','R','T','Y','U','I','O','P','Ğ','Ü'],
  ['A','S','D','F','G','H','J','K','L','Ş','İ'],
  ['ENTER','Z','C','V','B','N','M','Ö','Ç','⌫']
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let target, currentRow, currentCol, gameOver, board, revealed, streak;

function newGame() {
  target = VALID[Math.floor(Math.random() * VALID.length)];
  currentRow = 0;
  currentCol = 0;
  gameOver = false;
  board = Array.from({length:6}, () => Array(5).fill(''));
  revealed = Array.from({length:6}, () => Array(5).fill(null));
  streak = parseInt(localStorage.getItem('wordleStreak') || '0');
  document.getElementById('streakVal').textContent = streak;
  document.getElementById('resultBox').classList.remove('show');
  renderGrid();
  renderKeyboard();
  hideMsg();
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      const letter = board[r][c];
      if (letter) { tile.textContent = letter; tile.classList.add('filled'); }
      if (revealed[r][c]) tile.classList.add(revealed[r][c]);
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

function renderKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  ROWS_TR.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'key-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k.length > 1 ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

function updateKeyColors() {
  // Build best state per letter
  const state = {};
  for (let r = 0; r < currentRow; r++) {
    for (let c = 0; c < 5; c++) {
      const letter = board[r][c];
      const rev = revealed[r][c];
      if (!state[letter] || priority(rev) > priority(state[letter])) {
        state[letter] = rev;
      }
    }
  }
  document.querySelectorAll('.key').forEach(btn => {
    const k = btn.dataset.key;
    if (state[k]) {
      btn.classList.remove('correct','present','absent');
      btn.classList.add(state[k]);
    }
  });
}

function priority(s) { return s==='correct'?3:s==='present'?2:s==='absent'?1:0; }

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.key === 'Enter') handleKey('ENTER');
  else if (e.key === 'Backspace') handleKey('⌫');
  else if (/^[a-zA-ZçÇğĞıİöÖşŞüÜ]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

function handleKey(key) {
  if (gameOver) return;

  if (key === '⌫') {
    if (currentCol > 0) {
      currentCol--;
      board[currentRow][currentCol] = '';
      updateTile(currentRow, currentCol, '', false);
    }
    return;
  }

  if (key === 'ENTER') {
    submitGuess();
    return;
  }

  if (currentCol < 5) {
    board[currentRow][currentCol] = key;
    updateTile(currentRow, currentCol, key, true);
    currentCol++;
  }
}

function updateTile(r, c, letter, filled) {
  const tile = document.getElementById(`tile-${r}-${c}`);
  if (!tile) return;
  tile.textContent = letter;
  if (filled) tile.classList.add('filled');
  else tile.classList.remove('filled');
}

// ─── GUESS LOGIC ──────────────────────────────────────────────────────────────
function submitGuess() {
  if (currentCol < 5) { showMsg('5 harf gir!'); shakeRow(currentRow); return; }

  const guess = board[currentRow].join('');

  // Evaluate
  const result = evaluate(guess, target);
  revealed[currentRow] = result;

  // Animate tiles with flip
  revealRow(currentRow, result, () => {
    updateKeyColors();
    const won = result.every(r => r === 'correct');
    if (won) {
      streak++;
      localStorage.setItem('wordleStreak', streak);
      document.getElementById('streakVal').textContent = streak;
      gameOver = true;
      const msgs = ['Mükemmel! 🎯','Harika! 🔥','Çok iyi! 👏','İyi! 😊','Oldu! 😅','Son anda! 😰'];
      setTimeout(() => showResult(true, msgs[currentRow] || 'Tebrikler!'), 400);
    } else {
      currentRow++;
      currentCol = 0;
      if (currentRow === 6) {
        streak = 0;
        localStorage.setItem('wordleStreak', streak);
        document.getElementById('streakVal').textContent = streak;
        gameOver = true;
        setTimeout(() => showResult(false), 400);
      }
    }
  });
}

function evaluate(guess, target) {
  const result = Array(5).fill('absent');
  const targetArr = [...target];
  const guessArr = [...guess];
  const used = Array(5).fill(false);

  // First pass: correct
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = 'correct';
      used[i] = true;
    }
  }
  // Second pass: present
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === targetArr[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }
  return result;
}

function revealRow(r, result, cb) {
  let done = 0;
  for (let c = 0; c < 5; c++) {
    const tile = document.getElementById(`tile-${r}-${c}`);
    const delay = c * 120;
    setTimeout(() => {
      tile.style.animationDelay = '0ms';
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.add(result[c]);
        tile.classList.remove('reveal');
        done++;
        if (done === 5 && cb) cb();
      }, 250);
    }, delay);
  }
}

function shakeRow(r) {
  const row = document.getElementById(`row-${r}`);
  row.classList.add('shake');
  setTimeout(() => row.classList.remove('shake'), 400);
}

// ─── UI ───────────────────────────────────────────────────────────────────────
let msgTimeout;
function showMsg(text) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.classList.add('show');
  clearTimeout(msgTimeout);
  msgTimeout = setTimeout(() => el.classList.remove('show'), 1800);
}
function hideMsg() {
  document.getElementById('msg').classList.remove('show');
}

function showResult(won) {
  const box = document.getElementById('resultBox');
  const emoji = document.getElementById('resultEmoji');
  const title = document.getElementById('resultTitle');
  const word = document.getElementById('resultWord');

  if (won) {
    emoji.textContent = '🎉';
    title.textContent = 'BİLDİN!';
    word.innerHTML = `Kelime: <strong>${target}</strong>`;
  } else {
    emoji.textContent = '😔';
    title.textContent = 'BİTTİ';
    word.innerHTML = `Kelime: <strong>${target}</strong>`;
  }
  box.classList.add('show');
}

// Start!
newGame();
</script>
</body>
</html>
